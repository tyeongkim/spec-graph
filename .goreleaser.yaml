# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: spec-graph
    main: ./cmd/spec-graph
    binary: spec-graph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/tyeongkim/spec-graph/internal/cli.Version={{.Version}}
      - -X github.com/tyeongkim/spec-graph/internal/cli.Commit={{.Commit}}
      - -X github.com/tyeongkim/spec-graph/internal/cli.Date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "^docs:"
      - "^ci:"
      - "^build:"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 100
    - title: Bug fixes
      regexp: '^.*?(fix|refactor)(\(.+\))??!?:.+$'
      order: 200
    - title: Others
      order: 9999

release:
  name_template: "v{{ .Version }}"
  prerelease: auto
  footer: |
    **Full Changelog**: https://github.com/tyeongkim/spec-graph/compare/{{ .PreviousTag }}...{{ .Tag }}

homebrew_casks:
  # Stable cask: updated only on full releases. Skipped for prereleases (e.g. -beta).
  - name: spec-graph
    skip_upload: auto
    repository:
      owner: tyeongkim
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    url:
      template: "https://github.com/tyeongkim/spec-graph/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: https://github.com/tyeongkim/spec-graph
    description: Typed specification graph CLI for managing requirements, decisions, and phases
    binaries:
      - spec-graph
    hooks:
      post:
        install: 'system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}"]'
    commit_msg_template: "Update {{ .ProjectName }} to {{ .Tag }}"

  # Beta cask: updated only on prereleases. Installed via `brew install tyeongkim/tap/spec-graph@beta`.
  - name: spec-graph@beta
    skip_upload: '{{ if .Prerelease }}false{{ else }}true{{ end }}'
    repository:
      owner: tyeongkim
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    url:
      template: "https://github.com/tyeongkim/spec-graph/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: https://github.com/tyeongkim/spec-graph
    description: Typed specification graph CLI for managing requirements, decisions, and phases (beta channel)
    binaries:
      - spec-graph
    hooks:
      post:
        install: 'system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}"]'
    commit_msg_template: "Update {{ .ProjectName }} (beta) to {{ .Tag }}"
